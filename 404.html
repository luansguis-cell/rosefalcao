<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada | Rose Falcão</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" href="logo-sem.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal-deep:#3F5C55;--teal:#5F8880;--teal-soft:#B9D2CC;--mint:#EDF4F2;--cream:#FAF8F4;--white:#FFFFFF;--ink:#2C3A37;--gold:#C8A96A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;font-weight:300;color:var(--ink);background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:520px;}
img{width:70px;margin:0 auto 24px;opacity:.7;}
h1{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--teal-deep);font-size:clamp(2.4rem,6vw,3.4rem);margin-bottom:16px;}
p{font-size:1.05rem;opacity:.85;margin-bottom:32px;}
a.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 34px;border-radius:40px;font-weight:500;font-size:0.95rem;background:var(--teal-deep);color:var(--white);text-decoration:none;transition:all .3s ease;}
a.btn:hover{background:var(--teal);transform:translateY(-2px);}
</style>
</head>
<body>
  <div class="wrap">
    <img src="logo-sem.png" alt="">
    <h1>Página não encontrada</h1>
    <p>O endereço que você tentou acessar não existe ou foi movido. Volte para a página inicial para continuar navegando.</p>
    <a class="btn" href="/">Voltar ao início</a>
  </div>
</body>
</html>
